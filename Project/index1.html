<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style1.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>Productivity Dashboard</title>
</head>

<body>
    <div id="main">
        <nav>
        </nav>
        <section class="all-elems">
            <div class="todo elem" id="0">
                <img
                    src="https://plus.unsplash.com/premium_photo-1681487870238-4a2dfddc6bcb?q=80&w=1160&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <h2>To Do List ✅</h2>
            </div>
            <div class="daily elem" id="1">
                <img
                    src="https://images.unsplash.com/photo-1632772998001-cc9bf6f7c852?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <h2>Daily Planner 📅</h2>
            </div>
            <div class="pomodoro elem" id="2">
                <img
                    src="https://images.unsplash.com/photo-1711030239030-5f1eb868c907?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <h2>Pomodoro Timer ⌚</h2>
            </div>
            <div class="Goals elem" id="3">
                <img
                    src="https://images.unsplash.com/photo-1610540604745-3e96fba9ccef?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <h2>Daily Goals 🎯</h2>
            </div>
            <div class="moti elem" id="4">
                <img
                    src="https://plus.unsplash.com/premium_photo-1694743671394-60034a1b2f65?q=80&w=928&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <h2>Motivation 🔥</h2>
            </div>
        </section>

        <section class="fullElem todo-list-fullpage">
            <button class="back" id='0'><i class="ri-close-fill"></i></button>
            <h2>Your Personalized Task List</h2>
            <div class="todo-container">
                <div class="addTask">
                    <form>
                        <input id="task-input" type="text" placeholder="Enter Task">
                        <textarea placeholder="Enter Details" name="" id=""></textarea>
                        <div class="mark-imp">
                            <input type="checkbox" name="checkbox" id="check">
                            <label for="check">Mark as Important!</label>
                        </div>
                        <button>Add Task</button>
                    </form>
                </div>
                <div class="allTask">
                    
                    </div>

                </div>
            </div>
        </section>
        <section class="fullElem daily-planner-fullpage">
            <button class="back" id='1'><i class="ri-close-fill"></i></button>
            <h1>Daily Planner</h1>
        </section>
        <section class="fullElem pomodoro-fullpage">
            <button class="back" id='2'><i class="ri-close-fill"></i></button>
            <h1>Pomodoro Timer</h1>
        </section>
        <section class="fullElem daily-goals-fullpage">
            <button class="back" id='3'><i class="ri-close-fill"></i></button>
            <h1>Goals Page</h1>
        </section>
        <section class="fullElem motivational-fullpage">
            <button class="back" id='4'><i class="ri-close-fill"></i></button>
            <h1>Motivation Quotes</h1>
        </section>
    </div>
    <script src="script1.js"></script>
</body>

</html>
